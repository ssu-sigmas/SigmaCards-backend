version: '3.9'

services:
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    container_name: sigmacards-db
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigmacards -d sigmacards_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigmacards-network

  redis:
    image: redis:8-alpine
    container_name: sigmacards-redis
    ports:
      - "6379:6379"
    command: /bin/sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --save "" --appendonly no'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigmacards-network    

  # FastAPI приложение (ОСНОВНОЙ БЭКЕНД - БЕЗ ML)
  api:
    build: .
    container_name: sigmacards-api
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --reload
    ports:
      - "8010:8010"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sigmacards-network

  optimizer-cron:
    build: .
    container_name: sigmacards-optimizer-cron
    command: /app/scripts/start_optimizer_cron.sh
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      FSRS_OPTIMIZER_CRON_SCHEDULE: "${FSRS_OPTIMIZER_CRON_SCHEDULE:-0 3 * * *}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sigmacards-network

volumes:
  postgres_data:

networks:
  sigmacards-network:
    driver: bridge
