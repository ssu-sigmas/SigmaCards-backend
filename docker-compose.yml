version: '3.9'

services:
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    container_name: sigmacards-db
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigmacards -d sigmacards_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigmacards-network

  redis:
    image: redis:8-alpine
    container_name: sigmacards-redis
    ports:
      - "6379:6379"
    command: /bin/sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --save "" --appendonly no'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigmacards-network    

  kafka:
    image: apache/kafka:latest
    container_name: sigmacards-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://172.20.10.3:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_KRAFT_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - sigmacards-network

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: sigmacards-kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sigmacards-network    

  api:
    build: .
    container_name: sigmacards-api
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --reload
    ports:
      - "8010:8010"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sigmacards-network

  optimizer-cron:
    build: .
    container_name: sigmacards-optimizer-cron
    command: /app/scripts/start_optimizer_cron.sh
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      FSRS_OPTIMIZER_CRON_SCHEDULE: "${FSRS_OPTIMIZER_CRON_SCHEDULE:-0 3 * * *}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sigmacards-network

volumes:
  postgres_data:
  kafka_data:

networks:
  sigmacards-network:
    driver: bridge
