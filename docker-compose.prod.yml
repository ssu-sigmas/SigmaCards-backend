version: '3.9'

name: sigmacards-prod

services:
  traefik:
    image: traefik:v3.1
    container_name: sigmacards-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.grpc.address=:50051
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "80:80"
      - "443:443"
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    restart: unless-stopped
    networks:
      - sigmacards-network

  db:
    image: postgres:15-alpine
    container_name: sigmacards-db
    env_file:
      - .env.db.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sigmacards-network

  redis:
    image: redis:8-alpine
    container_name: sigmacards-redis
    command: /bin/sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --save "" --appendonly no'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sigmacards-network

  kafka:
    image: apache/kafka:3.8.0
    container_name: sigmacards-kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_KRAFT_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_LOG4J_ROOT_LOGLEVEL=WARN
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - sigmacards-network

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: sigmacards-kafka-ui
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "prod"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      LOGGING_LEVEL_ROOT: WARN
    depends_on:
      kafka:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.sigmacards-kafka-ui.rule=Host(`${KAFKA_UI_DOMAIN}`)
      - traefik.http.routers.sigmacards-kafka-ui.entrypoints=websecure
      - traefik.http.routers.sigmacards-kafka-ui.tls.certresolver=letsencrypt
      - traefik.http.services.sigmacards-kafka-ui.loadbalancer.server.port=8080
    restart: unless-stopped
    networks:
      - sigmacards-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: sigmacards-rustfs
    env_file:
      - .env.prod
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.sigmacards-rustfs-ui.rule=Host(`${RUSTFS_UI_DOMAIN}`)
      - traefik.http.routers.sigmacards-rustfs-ui.entrypoints=websecure
      - traefik.http.routers.sigmacards-rustfs-ui.tls.certresolver=letsencrypt
      - traefik.http.services.sigmacards-rustfs-ui.loadbalancer.server.port=9001
    restart: unless-stopped
    networks:
      - sigmacards-network

  api:
    image: ${APP_IMAGE:-ghcr.io/ssu-sigmas/sigmacards-backend}:${APP_IMAGE_TAG:-latest}
    container_name: sigmacards-api
    command: >
      /bin/sh -c "
      chmod +x scripts/generate_grpc.sh &&
      ./scripts/generate_grpc.sh &&
      hypercorn main:app --bind 0.0.0.0:${APP_PORT:-8010}
      "
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rustfs:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.sigmacards-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.sigmacards-api.entrypoints=websecure
      - traefik.http.routers.sigmacards-api.tls.certresolver=letsencrypt
      - traefik.http.services.sigmacards-api.loadbalancer.server.port=${APP_PORT:-8010}
      - traefik.tcp.routers.sigmacards-grpc.rule=HostSNI(`*`)
      - traefik.tcp.routers.sigmacards-grpc.entrypoints=grpc
      - traefik.tcp.routers.sigmacards-grpc.service=sigmacards-grpc-svc
      - traefik.tcp.services.sigmacards-grpc-svc.loadbalancer.server.port=50051
    restart: unless-stopped
    networks:
      - sigmacards-network

  tasks-cron:
    image: ${APP_IMAGE:-ghcr.io/ssu-sigmas/sigmacards-backend}:${APP_IMAGE_TAG:-latest}
    container_name: sigmacards-cron
    command: /app/scripts/start_cron.sh
    env_file:
      - .env.prod
    environment:
      FSRS_OPTIMIZER_CRON_SCHEDULE: "${FSRS_OPTIMIZER_CRON_SCHEDULE:-0 3 * * *}"
      IMAGE_ORPHAN_CLEANUP_CRON_SCHEDULE: "${IMAGE_ORPHAN_CLEANUP_CRON_SCHEDULE:-0 4 * * *}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sigmacards-network

volumes:
  postgres_data:
  kafka_data:
  rustfs_data:
  traefik_letsencrypt:

networks:
  sigmacards-network:
    name: sigmacards-network