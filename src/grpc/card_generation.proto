syntax = "proto3";

package sigmacards.cards.v1;

service CardGenerationService {
  rpc GenerateCards (stream GenerateCardsStreamRequest) returns (stream GenerateCardsStreamResponse);
}

message PdfSource {
  string object_name = 1;
}

message GenerateCardsRequest {
  oneof source {
    string text = 1;
    PdfSource pdf = 3;
  }
  uint32 count = 2;
}

message StopGenerationRequest {
  string reason = 1;
}

message GenerateCardsStreamRequest {
  oneof payload {
    GenerateCardsRequest generate = 1;
    StopGenerationRequest stop = 2;
  }
}

message TextBlock {
  string type = 1;
  string id = 2;
  string content = 3;
}

message CardContent {
  repeated TextBlock front = 1;
  repeated TextBlock back = 2;
}

message GeneratedCard {
  CardContent content = 1;
}

message StatusMessage {
  string message = 1;
}

message GenerationIdMessage {
  string generation_id = 1;
}

message CompletedMessage {
  bool stopped_by_user = 1;
}

message ErrorMessage {
  string message = 1;
}

message GenerateCardsStreamResponse {
  oneof payload {
    StatusMessage status = 1;
    GenerationIdMessage generation_id = 2;
    GeneratedCard card = 3;
    CompletedMessage completed = 4;
    ErrorMessage error = 5;
  }
}